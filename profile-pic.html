<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profile Pic — BT Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0a1120;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:30px 16px;font-family:"JetBrains Mono",monospace;}
  .hint{color:#8b93a2;font-size:12px;letter-spacing:.06em;text-align:center;line-height:1.7;max-width:360px;}
  .hint b{color:#c6a273;}
  .pic{width:320px;height:320px;border-radius:50%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.55);border:1px solid rgba(198,162,115,.25);}
  .pic img{width:100%;height:100%;object-fit:cover;display:block;}
  .dl{color:#c6a273;font-size:12px;letter-spacing:.06em;text-decoration:none;border:1px solid rgba(198,162,115,.4);padding:9px 16px;border-radius:6px;}
  .dl:hover{background:rgba(198,162,115,.1);}
</style>
</head>
<body>
  <p class="hint">Your profile picture — your real BT Marketing mark on navy.<br /><b>Screenshot the circle</b> (or download below) → Instagram → Change photo.</p>
  <div class="pic"><img src="profile-pic.png" alt="BT Marketing profile picture" /></div>
  <a class="dl" href="profile-pic.png" download>Download the file</a>
</body>
</html>
